<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PBC SyncFlow</title> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/pilipmul/PBC-cek-Piutang/main/Logo%201.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; 
            background: url('https://raw.githubusercontent.com/pilipmul/PBC-cek-Piutang/6d34302da336e6b94b116bff0ce07084c5f95c3e/BG2.jpg') no-repeat center center fixed; 
            background-size: cover; display: flex; justify-content: center; 
            align-items: flex-start; min-height: 100vh; padding-top: 20px; 
        }
        .container { 
            width: 92%; max-width: 440px; background: #ffffff; padding: 20px 22px 28px 22px; 
            border-radius: 16px; border: 2px solid #1877f2; box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            position: relative; text-align: center; margin-bottom: 20px;
        }
        #titleBtn { width: 100%; max-width: 280px; transition: opacity 0.2s; user-select: none; }
        #nameWrapper { position: relative; padding: 2px 0; border-top: 1px solid #1877f2; border-bottom: 1px solid #1877f2; }
        input, textarea { width: 100%; padding: 5px 10px; border: none; font-size: 1rem; background: transparent; text-align: center; height: 34px; line-height: 1.2; display: block; resize: none; }
        input:focus, textarea:focus { outline: none; }
        
        .row-3col { display: grid; grid-template-columns: 40% 20% 40%; gap: 0; align-items: center; margin-bottom: 5px; border-bottom: 1px solid #1877f2; padding: 5px 0; position: relative; }
        .qty-wrapper { position: relative; display: grid; place-items: center; border-left: 1px solid #1877f2; border-right: 1px solid #1877f2; height: 34px; }
        .stock-overlay { grid-area: 1/1; font-size: 1.1rem; font-weight: 700; color: rgba(220, 38, 38, 0.6); pointer-events: none; display: none; z-index: 1; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 10px; justify-content: center; align-items: center; }
        button { flex: 1; padding: 5px 14px; background: #1877f2; color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        button.add-row { background: transparent; flex: none; }

        #historyPopup { 
            position: absolute; top: 35px; right: 10px; background: #fff; 
            border: 2px solid #1877f2; border-radius: 8px; width: 280px; 
            max-height: 380px; overflow-y: auto; display: none; text-align: left; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 5000; 
        }
        .history-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.8rem; line-height: 1.4; }
        
        .autocomplete-list { position: absolute; background: #fff; border: 1px solid #ccc; border-radius: 6px; z-index: 2000; max-height: 180px; overflow-y: auto; width: 100%; display: none; top: 34px; left: 0; }
        .autocomplete-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .autocomplete-item:hover { background: #1877f2; color: #fff; }

        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 6000; }
        .popup-box { background: #fff; border-radius: 16px; padding: 24px; width: 90%; max-width: 320px; text-align: center; border: 2px solid #1877f2; }
        .delete-row { position: absolute; top: -10px; right: -2px; color: #dc2626; font-weight: bold; cursor: pointer; background: transparent; border: none; font-size: 1.1rem; }
        
        #gaIndicator { position: absolute; top: 10px; left: 35px; color: #1877f2; font-weight: 800; display: none; }
        .dropdown-menu { position: absolute; top: 35px; right: 10px; background: white; border: 1px solid #1877f2; border-radius: 8px; display: none; flex-direction: column; min-width: 110px; z-index: 100; }
        .dropdown-item { padding: 10px 15px; font-size: 0.9rem; cursor: pointer; color: #1877f2; font-weight: 600; border-bottom: 1px solid #eee; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinning { animation: spin 1s linear infinite; }
        #loaderOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.4); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .loader { border: 6px solid #f3f3f3; border-top: 6px solid #1877f2; border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; }
    </style>
</head>
<body>
<div id="loaderOverlay"><div class="loader"></div></div>

<div class="container">
    <div id="popupToast" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(33, 33, 33, 0.9); color: #fff; padding: 12px; border-radius: 12px; display: none; z-index: 7000;"></div>
    
    <div class="header-actions" style="position: absolute; top: 10px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 10px;">
        <button id="refreshBtn" onclick="fetchDataAndUpdateUI()" style="background:none; width:auto; border:none; padding:0;">
            <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#1877f2"><path d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-110h80v280H520v-80h168q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h84q-28 106-114 173t-196 67Z"/></svg>
        </button>
        <div id="gaIndicator">GA</div> 
        <button id="hamburgerBtn" onclick="toggleDropdown(event)" style="background:none; width:auto; border:none; padding:0;">
            <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#1877f2"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
        </button>
        <div id="myDropdown" class="dropdown-menu">
            <div class="dropdown-item" onclick="toggleGAMode()">GA Mode</div>
            <div id="btnHistoryGA" class="dropdown-item" style="display:none;" onclick="toggleHistoryPopup(event)">~50 Trx</div>
        </div>
    </div>

    <div id="historyPopup">
        <div style="position: sticky; top: 0; background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #1877f2; color: #1877f2; font-weight: bold;">~50 Trx</div>
        <div id="historyList"></div>
    </div>

    <div style="margin: 20px 0;"><img id="titleBtn" src="https://raw.githubusercontent.com/pilipmul/PBC-cek-Piutang/c917d70c8d2a8f1630b8dd1400a2d13c2aa55d65/Title%20PBC%20B.png"></div>

    <form id="myForm">
        <div id="nameWrapper">
            <input type="text" id="name" placeholder="Name" autocomplete="off" required>
            <div id="nameList" class="autocomplete-list"></div>
        </div>
        <div id="itemContainer">
            <div class="row-3col item-row">
                <div style="position: relative;">
                    <input type="text" class="item" placeholder="Item" autocomplete="off" required>
                    <div class="autocomplete-list"></div>
                </div>
                <div class="qty-wrapper">
                    <span class="stock-overlay"></span>
                    <input type="number" class="qty" min="1" placeholder="Qty" required>
                </div>
                <div style="position: relative;">
                    <textarea class="desc" placeholder="Notes" onmousedown="startLongPress(event, this)" ontouchstart="startLongPress(event, this)"></textarea>
                    <button type="button" class="delete-row">×</button>
                </div>
            </div>
        </div>
        <div class="btn-group">
            <button type="button" id="btnIn" style="opacity:0.15; pointer-events:none;">IN</button>
            <button type="button" class="add-row" id="addRow">
                <svg xmlns="http://www.w3.org/2000/svg" height="32px" viewBox="0 -960 960 960" width="32px" fill="#1877f2"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
            </button>
            <button type="button" id="btnOut">OUT</button>
        </div>
    </form>
</div>

<div id="confirmPopup" class="popup-overlay"><div class="popup-box"><h3 id="confirmTitle" style="color:#1877f2;"></h3><div id="confirmItems" style="text-align:left; margin-bottom:20px;"></div><div class="btn-group"><button id="finalSubmitBtn">POST</button><button onclick="closePopup('confirmPopup')" style="background:#555;">CANCEL</button></div></div></div>
<div id="successPopup" class="popup-overlay"><div class="popup-box"><div id="successMode" style="background:#facc15; padding:4px 10px; border-radius:20px; font-weight:bold; display:inline-block; margin-bottom:10px;"></div><div id="successItems" style="text-align:left; margin-bottom:20px;"></div><button onclick="closePopup('successPopup')">Close</button></div></div>
<div id="descPopup" class="popup-overlay"><div class="popup-box"><textarea id="descPopupInput" style="width:100%; height:120px; border:1px solid #1877f2; border-radius:8px; margin-bottom:10px; text-align:left;"></textarea><button onclick="saveDescPopup()">Save</button></div></div>
<div id="passPopup" class="popup-overlay"><div class="popup-box"><input type="password" id="adminPass" placeholder="Password" style="border:1px solid #1877f2; border-radius:8px; margin-bottom:15px; height:45px;"><div class="btn-group"><button onclick="checkPassword()">OK</button><button onclick="closePopup('passPopup')" style="background:#555;">Batal</button></div></div></div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzNzaOwIeHkxlp9wdeHDlCLTfqbXlS-A6yzC8c-m4KDIzT-JlBLK_5QqBc6lHXmK41GSQ/exec';
    let nameData = [], itemData = [], itemStock = {}, lastTransactions = [], gaMode = false, activeTextarea = null, longPressTimer, passAction = "", currentMode = "", currentItems = [], currentName = "";

    function toggleDropdown(e) { e.stopPropagation(); const d = document.getElementById("myDropdown"); d.style.display = (d.style.display === "flex") ? "none" : "flex"; }
    function closePopup(id) { document.getElementById(id).style.display = "none"; }

    function toggleGAMode() { 
        document.getElementById("myDropdown").style.display = "none"; 
        if (!gaMode) { passAction = "ga"; document.getElementById("passPopup").style.display = "flex"; document.getElementById("adminPass").focus(); } 
        else { updateGAUI(false); } 
    }

    function updateGAUI(status) { 
        gaMode = status; 
        document.getElementById("gaIndicator").style.display = gaMode ? "block" : "none"; 
        document.getElementById("btnHistoryGA").style.display = gaMode ? "block" : "none"; 
        const btnIn = document.getElementById("btnIn");
        btnIn.style.opacity = gaMode ? "1" : "0.15";
        btnIn.style.pointerEvents = gaMode ? "auto" : "none";
        initAutocomplete(); 
    }

    async function fetchDataAndUpdateUI() {
        const icon = document.getElementById("refreshIcon");
        icon.classList.add("spinning");
        try {
            const resp = await fetch(`${scriptURL}?action=getDropdownData`);
            const data = await resp.json();
            nameData = data.names; itemData = data.items; itemStock = data.stocks; lastTransactions = data.transactions;
            initAutocomplete();
        } catch (e) { showToast("❌ Sync Error"); } finally { icon.classList.remove("spinning"); }
    }

    function toggleHistoryPopup(e) { 
        e.stopPropagation(); 
        const p = document.getElementById("historyPopup"); 
        p.style.display = p.style.display === "block" ? "none" : "block"; 
        
        document.getElementById("historyList").innerHTML = lastTransactions.map(t => {
            const dateStr = t[5] ? new Date(t[5]).toLocaleDateString('id-ID', {day:'2-digit', month:'2-digit'}) : '';
            return `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between; color:#666; font-size:0.7rem; margin-bottom:2px;">
                    <span>${dateStr}</span>
                    <span style="font-weight:600;">${t[0]}</span>
                </div>
                <div>
                    <span style="color:${t[1]==='in'?'#16a34a':'#dc2626'}; font-weight:bold;">${t[1].toUpperCase()}</span> 
                    <b>${t[2]}</b> (${t[3]})
                </div>
                ${t[4] ? `<div style="color:#555; font-style:italic; font-size:0.75rem; margin-top:2px; background:#f9f9f9; padding:2px 5px; border-radius:4px;">Note: ${t[4]}</div>` : ''}
            </div>`;
        }).join(''); 
    }

    function setupAutocomplete(input, box, data, isItem=false, overlay=null, qtyInput=null) {
        const updateOverlay = () => {
            if (isItem && gaMode && itemStock[input.value.trim()] !== undefined) {
                overlay.textContent = itemStock[input.value.trim()];
                overlay.style.display = qtyInput.value ? "none" : "block";
            } else if (overlay) { overlay.style.display = "none"; }
        };
        input.oninput = () => {
            const val = input.value.trim().toLowerCase();
            updateOverlay();
            if (!val) { box.style.display = "none"; return; }
            const match = data.filter(d => d.toLowerCase().includes(val)).slice(0, 10);
            box.innerHTML = match.map(m => `<div class="autocomplete-item">${m}</div>`).join('');
            box.style.display = match.length ? "block" : "none";
            box.querySelectorAll(".autocomplete-item").forEach(div => {
                div.onclick = () => { input.value = div.textContent; box.style.display = "none"; updateOverlay(); };
            });
        };
        if (qtyInput) qtyInput.oninput = updateOverlay;
    }

    function initAutocomplete() {
        setupAutocomplete(document.getElementById("name"), document.getElementById("nameList"), nameData);
        document.querySelectorAll(".item-row").forEach(row => {
            setupAutocomplete(row.querySelector(".item"), row.querySelector(".autocomplete-list"), itemData, true, row.querySelector(".stock-overlay"), row.querySelector(".qty"));
        });
    }

    async function handleSubmit(mode) {
        currentName = document.getElementById("name").value.trim();
        if (!nameData.includes(currentName)) return showToast("⚠️ Pilih Nama!");
        currentItems = [...document.querySelectorAll(".item-row")].map(row => ({
            item: row.querySelector(".item").value.trim(),
            qty: parseInt(row.querySelector(".qty").value),
            desc: row.querySelector(".desc").value.trim()
        })).filter(it => it.item && it.qty);
        if (!currentItems.length) return showToast("⚠️ Isi Item!");
        currentMode = mode;
        document.getElementById("confirmTitle").innerText = mode.toUpperCase();
        document.getElementById("confirmItems").innerHTML = currentItems.map(i => `- ${i.item}: <span style="color:red;">${i.qty}</span>`).join('<br>');
        document.getElementById("confirmPopup").style.display = "flex";
        document.getElementById("finalSubmitBtn").onclick = () => { closePopup('confirmPopup'); executeFinalSubmit(mode, currentName, currentItems); };
    }

    async function executeFinalSubmit(mode, name, items) {
        document.getElementById("loaderOverlay").style.display = "flex";
        const body = new URLSearchParams();
        body.append('name', name); body.append('mode', mode); body.append('items', JSON.stringify(items)); body.append('date', new Date().toLocaleDateString('id-ID'));
        try {
            const resp = await fetch(scriptURL, { method: 'POST', body: body });
            const res = await resp.json();
            if (res.result === "success") { 
                showSuccessPopup(mode, items);
                document.getElementById("myForm").reset();
                const container = document.getElementById("itemContainer");
                while(container.children.length > 1) container.removeChild(container.lastChild);
                document.getElementById("addRow").style.visibility = "visible";
                fetchDataAndUpdateUI(); 
            } else showToast(res.error);
        } catch (e) { showToast("❌ Error"); } finally { document.getElementById("loaderOverlay").style.display = "none"; }
    }

    function checkPassword() {
        if (document.getElementById("adminPass").value === "azza") {
            closePopup('passPopup'); document.getElementById("adminPass").value = "";
            if (passAction === "ga") updateGAUI(true);
        } else showToast("❌ Salah!");
    }

    function showToast(m) { const t = document.getElementById("popupToast"); t.textContent = m; t.style.display = "block"; setTimeout(() => t.style.display="none", 2500); }
    function showSuccessPopup(m, its) { 
        document.getElementById("successMode").textContent = m.toUpperCase(); 
        document.getElementById("successItems").innerHTML = its.map(i => `• ${i.item}: <span style="color:red;">${i.qty}</span>`).join('<br>'); 
        document.getElementById("successPopup").style.display = "flex"; 
    }
    
    function startLongPress(e, el) {
        activeTextarea = el;
        longPressTimer = setTimeout(() => {
            document.getElementById("descPopupInput").value = el.value;
            document.getElementById("descPopup").style.display = "flex";
            document.getElementById("descPopupInput").focus();
        }, 600);
        const cancel = () => clearTimeout(longPressTimer);
        el.onmouseup = cancel; el.onmouseleave = cancel; el.ontouchend = cancel;
    }

    function saveDescPopup() { if (activeTextarea) activeTextarea.value = document.getElementById("descPopupInput").value; closePopup('descPopup'); }

    document.getElementById("addRow").onclick = () => {
        const container = document.getElementById("itemContainer");
        if (container.children.length < 5) {
            const clone = container.children[0].cloneNode(true);
            clone.querySelectorAll("input, textarea").forEach(i => i.value = "");
            clone.querySelector(".stock-overlay").style.display = "none";
            clone.querySelector(".autocomplete-list").style.display = "none";
            container.appendChild(clone);
            initAutocomplete();
            if (container.children.length === 5) document.getElementById("addRow").style.visibility = "hidden";
        }
    };

    document.addEventListener("click", e => {
        if (e.target.classList.contains("delete-row")) {
            e.target.closest(".item-row").remove();
            document.getElementById("addRow").style.visibility = "visible";
        }
        if (!e.target.closest(".autocomplete-list") && !e.target.closest("input")) document.querySelectorAll(".autocomplete-list").forEach(l => l.style.display = "none");
        if (!e.target.closest("#myDropdown") && !e.target.closest("#hamburgerBtn")) document.getElementById("myDropdown").style.display = "none";
        if (!e.target.closest("#historyPopup") && !e.target.closest("#btnHistoryGA")) document.getElementById("historyPopup").style.display = "none";
    });

    document.getElementById("btnIn").onclick = () => handleSubmit("in");
    document.getElementById("btnOut").onclick = () => handleSubmit("out");
    window.onload = fetchDataAndUpdateUI;
</script>
</body>
</html>
